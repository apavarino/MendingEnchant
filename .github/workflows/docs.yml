name: Deploy Docs

on:
  push:
    branches:
      - main
      - master
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - "README.md"
      - "settings.gradle.kts"
      - "mending-enchant-core/build.gradle.kts"
      - "mending-enchant-core/src/main/resources/plugin.yml"
      - "mending-enchant-core/src/main/resources/config.yml"
      - "mending-enchant-core/src/main/resources/localization/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    uses: Stellionix/docs-common/.github/workflows/deploy-docs.yml@main
